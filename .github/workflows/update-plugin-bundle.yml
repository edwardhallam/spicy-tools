name: Update Plugin Bundle

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: spicy-tools-plugin-bundle
  cancel-in-progress: true

jobs:
  update-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

      - run: pnpm run build

      - name: Check generated assets
        id: bundle
        run: |
          if git diff --quiet -- main.js styles.css manifest.json versions.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Plugin bundle already current."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat -- main.js styles.css manifest.json versions.json
          fi

      - name: Commit generated assets
        if: steps.bundle.outputs.changed == 'true'
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add main.js styles.css manifest.json versions.json
          git commit -m "build: update spicy-tools plugin bundle"
          git push origin HEAD:main
