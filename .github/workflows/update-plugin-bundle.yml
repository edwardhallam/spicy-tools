name: Update Plugin Bundle

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: spicy-tools-plugin-bundle
  cancel-in-progress: true

jobs:
  update-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - name: Check generated assets
        id: bundle
        run: |
          if git diff --quiet -- main.js styles.css manifest.json versions.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Plugin bundle already current."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat -- main.js styles.css manifest.json versions.json
          fi

      - name: Open bundle update PR
        if: steps.bundle.outputs.changed == 'true'
        env:
          BOT_TOKEN: ${{ secrets.SPICY_TOOLS_BUNDLE_BOT_TOKEN }}
          GH_TOKEN: ${{ secrets.SPICY_TOOLS_BUNDLE_BOT_TOKEN }}
          BRANCH: automation/spicy-tools-plugin-bundle
        run: |
          set -euo pipefail

          if [ -z "${BOT_TOKEN}" ]; then
            echo "SPICY_TOOLS_BUNDLE_BOT_TOKEN is required so the generated-assets PR can trigger CI and auto-merge."
            exit 1
          fi

          git config user.name "spicy-tools bundle bot"
          git config user.email "spicy-tools-bundle-bot@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${BOT_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          git checkout -B "${BRANCH}"
          git add main.js styles.css manifest.json versions.json
          git commit -m "build: update spicy-tools plugin bundle"
          git push --force-with-lease origin "${BRANCH}"

          if gh pr view "${BRANCH}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh pr edit "${BRANCH}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "build: update spicy-tools plugin bundle" \
              --body "Regenerates committed Obsidian plugin assets after dependency changes on main."
          else
            gh pr create \
              --repo "${GITHUB_REPOSITORY}" \
              --base main \
              --head "${BRANCH}" \
              --title "build: update spicy-tools plugin bundle" \
              --body "Regenerates committed Obsidian plugin assets after dependency changes on main."
          fi

          gh pr merge "${BRANCH}" \
            --repo "${GITHUB_REPOSITORY}" \
            --squash \
            --auto \
            --delete-branch
