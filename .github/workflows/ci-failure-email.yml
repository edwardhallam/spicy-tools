name: CI Failure Email

on:
  workflow_run:
    workflows:
      - CI
      - Update Plugin Bundle
    types:
      - completed

permissions:
  statuses: write

jobs:
  notify:
    name: Email failed workflow run
    if: ${{ github.event.workflow_run.conclusion == 'failure' || github.event.workflow_run.conclusion == 'timed_out' }}
    runs-on: ubuntu-latest
    steps:
      - name: Send failure email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          CI_ALERT_EMAIL: edwardhallam@fastmail.com
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_API_URL: ${{ github.api_url }}
          STATUS_TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WORKFLOW_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WORKFLOW_SHA: ${{ github.event.workflow_run.head_sha }}
          WORKFLOW_ACTOR: ${{ github.event.workflow_run.actor.login }}
          WORKFLOW_URL: ${{ github.event.workflow_run.html_url }}
          WORKFLOW_TITLE: ${{ github.event.workflow_run.display_title }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          set_commit_status() {
            local state="$1"
            local description="$2"

            status_payload=$(jq -n \
              --arg state "${state}" \
              --arg context "CI Failure Email / resend" \
              --arg description "${description}" \
              --arg target_url "${STATUS_TARGET_URL}" \
              '{
                state: $state,
                context: $context,
                description: $description,
                target_url: $target_url
              }')

            curl -sS "${GITHUB_API_URL}/repos/${REPOSITORY}/statuses/${WORKFLOW_SHA}" \
              -X POST \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -H "Content-Type: application/json" \
              -d "${status_payload}" \
              >/dev/null
          }

          if [ -z "${RESEND_API_KEY}" ]; then
            set_commit_status "failure" "Missing RESEND_API_KEY secret"
            echo "::error::Missing RESEND_API_KEY secret"
            exit 1
          fi

          short_sha="${WORKFLOW_SHA:0:7}"
          subject="[${REPOSITORY}] ${WORKFLOW_NAME} ${WORKFLOW_CONCLUSION} on ${WORKFLOW_BRANCH}"
          text_body=$(cat <<EOF
          GitHub Actions workflow failed.

          Repository: ${REPOSITORY}
          Workflow: ${WORKFLOW_NAME}
          Conclusion: ${WORKFLOW_CONCLUSION}
          Branch: ${WORKFLOW_BRANCH}
          Commit: ${short_sha}
          Actor: ${WORKFLOW_ACTOR}
          Title: ${WORKFLOW_TITLE}

          ${WORKFLOW_URL}
          EOF
          )

          payload=$(jq -n \
            --arg from "GitHub Actions <github-actions@send.spicyeddie.com>" \
            --arg to "${CI_ALERT_EMAIL}" \
            --arg subject "${subject}" \
            --arg text "${text_body}" \
            --arg repo "${REPOSITORY}" \
            --arg workflow "${WORKFLOW_NAME}" \
            --arg conclusion "${WORKFLOW_CONCLUSION}" \
            '{
              from: $from,
              to: [$to],
              subject: $subject,
              text: $text,
              tags: [
                {name: "repo", value: ($repo | gsub("[^A-Za-z0-9_-]"; "_"))},
                {name: "workflow", value: ($workflow | gsub("[^A-Za-z0-9_-]"; "_"))},
                {name: "conclusion", value: $conclusion}
              ]
            }')

          response_file="$(mktemp)"
          http_status=$(curl -sS https://api.resend.com/emails \
            -o "${response_file}" \
            -w "%{http_code}" \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "${payload}" || true)

          echo "Resend API status: ${http_status}"
          cat "${response_file}"
          echo

          if [ "${http_status}" -lt 200 ] || [ "${http_status}" -ge 300 ]; then
            set_commit_status "failure" "Resend email send failed: HTTP ${http_status}"
            echo "::error::Resend API returned HTTP ${http_status}"
            exit 1
          fi

          set_commit_status "success" "Failure email accepted by Resend"
