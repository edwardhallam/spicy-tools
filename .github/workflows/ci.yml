name: CI
on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm run build
      - name: Verify committed plugin bundle is current
        run: |
          if ! git diff --quiet -- main.js styles.css manifest.json versions.json; then
            echo "pnpm run build changed committed plugin assets. Commit the regenerated bundle."
            git diff --stat -- main.js styles.css manifest.json versions.json
            exit 1
          fi
